# SonarCloud configuration for misdirection-proxy
# SPDX-FileCopyrightText: 2026 Pedro Sordo Martínez <amurlaniakea@gmail.com>
# SPDX-License-Identifier: AGPL-3.0-or-later

sonar.projectKey=amurlaniakea_misdirection-proxy
sonar.organization=amurlaniakea
sonar.projectName=misdirection-proxy
sonar.projectVersion=1.0.0

# Source
sonar.sources=src
sonar.exclusions=**/__pycache__/**,**/*.pyc

# Tests
sonar.tests=tests
sonar.test.inclusions=test_*.py

# Python specific
sonar.language=py
sonar.python.version=3.10,3.11,3.12
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8
