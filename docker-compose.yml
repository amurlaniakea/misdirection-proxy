# Misdirection Proxy — Production Stack
# Full observability: Proxy + Redis + Prometheus + Grafana
#
# Usage:
#   docker compose up -d                    # Start all services
#   docker compose logs -f proxy            # Watch proxy logs
#   docker compose run --rm simulator       # Run traffic simulation
#   docker compose down                     # Stop all services
#
# Access points:
#   Proxy API:     http://localhost:8080
#   Prometheus:    http://localhost:9090
#   Grafana:       http://localhost:3000 (admin/admin)

version: "3.9"

services:
  # ── Redis Session Store ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: misdirection-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - proxy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ── Misdirection Proxy Gateway ──────────────────────────────
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: misdirection-proxy
    ports:
      - "8080:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - UPSTREAM_LLM_URL=http://host.docker.internal:11434
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - proxy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Prometheus Metrics Collector ────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: misdirection-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - proxy-network
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    depends_on:
      - proxy

  # ── Grafana Visualization ───────────────────────────────────
  grafana:
    image: grafana/grafana-oss:latest
    container_name: misdirection-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - proxy-network
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

  # ── Traffic Simulator (on-demand) ───────────────────────────
  # Run with: docker compose run --rm simulator
  simulator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: misdirection-simulator
    networks:
      - proxy-network
    profiles:
      - simulator
    entrypoint: ["python", "scripts/simulate_traffic.py"]
    environment:
      - PROXY_URL=http://proxy:8000
    depends_on:
      proxy:
        condition: service_healthy

# ── Networks ─────────────────────────────────────────────────
networks:
  proxy-network:
    driver: bridge

# ── Volumes ─────────────────────────────────────────────────
volumes:
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
